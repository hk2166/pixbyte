version: '3.8'

services:
  app:
    build: .
    ports:
      - "8888:8888"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8888
    volumes:
      - uploads:/tmp/oled_uploads
      - outputs:/tmp/oled_outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/displays"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads:
  outputs:
