; PlatformIO configuration for ESP32 OLED Video Player
[env:esp32dev]
platform   = espressif32
board      = esp32dev
framework  = arduino
monitor_speed = 115200

lib_deps =
  Wire
  SD
  Arduino_JSON

build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM

; Increase I2C buffer for chunked frame transfers
build_flags =
  -DWIRE_BUFFER_SIZE=256
